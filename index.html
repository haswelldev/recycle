<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recycle</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>♻️</text></svg>">
  <script>
    (function () {
      try {
        var theme = localStorage.getItem('recycle:theme');
        if (theme === 'light' || theme === 'dark') {
          document.documentElement.setAttribute('data-theme', theme);
        }
      } catch (e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-glow" aria-hidden="true"></div>

  <div class="theme-switcher" role="group" aria-label="Theme">
    <button type="button" class="theme-btn" data-theme-choice="light">Light</button>
    <button type="button" class="theme-btn" data-theme-choice="dark">Dark</button>
    <button type="button" class="theme-btn" data-theme-choice="system">System</button>
  </div>

  <main class="card">
    <header class="header">
      <span class="pill"><span class="pill-dot"></span> Ant Queen Camp Timer</span>
      <h1><span class="grad">Recycle</span></h1>
      <p class="tagline">A reminder to recycle your characters while camping.</p>
    </header>

    <div class="timer-display" id="timerDisplay">05:00</div>

    <div class="controls">
      <div class="field">
        <label for="durationSelect">Loop duration</label>
        <select id="durationSelect">
          <option value="60">1 minute</option>
          <option value="100">1 minute 40 seconds</option>
          <option value="300" selected>5 minutes</option>
          <option value="600">10 minutes</option>
          <option value="1080">18 minutes</option>
        </select>
      </div>

      <div class="field">
        <label for="soundSelect">Sound</label>
        <select id="soundSelect">
          <option value="nihao" selected>nihao</option>
        </select>
      </div>
    </div>

    <div class="buttons">
      <button id="startPauseBtn" class="btn btn-primary">Start</button>
      <button id="resetBtn" class="btn btn-secondary">Reset</button>
    </div>
  </main>

  <footer class="footer">
    <p>Made for Veridis Quo with Love</p>
    <p><a href="https://github.com/haswelldev/recycle" target="_blank" rel="noopener">GitHub</a> · Licensed under GPL-3.0</p>
  </footer>

  <audio id="nihaoAudio" src="assets/nihao.mp3" preload="auto"></audio>

  <script src="app.js"></script>
</body>
</html>
