<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recycle</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>♻️</text></svg>">
  <script>
    (function () {
      try {
        var theme = localStorage.getItem('recycle:theme');
        if (theme === 'light' || theme === 'dark') {
          document.documentElement.setAttribute('data-theme', theme);
        }
      } catch (e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-glow" aria-hidden="true"></div>

  <div class="theme-switcher" role="group" aria-label="Theme">
    <button type="button" class="theme-btn" data-theme-choice="light">Light</button>
    <button type="button" class="theme-btn" data-theme-choice="dark">Dark</button>
    <button type="button" class="theme-btn" data-theme-choice="system">System</button>
  </div>

  <main class="card">
    <header class="header">
      <span class="pill"><span class="pill-dot"></span>Relog Camp Timer</span>
      <h1><span class="grad">Recycle</span></h1>
      <p class="tagline">A reminder to recycle your characters while camping.</p>
    </header>

    <div class="timer-display" id="timerDisplay">05:00</div>

    <div class="controls">
      <div class="field">
        <label for="durationSelect">Loop duration</label>
        <select id="durationSelect">
          <option value="60">1 minute</option>
          <option value="100">1 minute 40 seconds</option>
          <option value="300" selected>5 minutes</option>
          <option value="600">10 minutes</option>
          <option value="1080">18 minutes</option>
        </select>
      </div>

      <div class="field">
        <label for="soundSelect">Sound</label>
        <select id="soundSelect">
          <option value="nihao" selected>nihao</option>
          <option value="itakimo">itakimo bali ahh</option>
          <option value="fahhhh">fahhhh</option>
          <option value="ding">ding</option>
        </select>
      </div>
    </div>

    <div class="field field-volume">
      <div class="volume-label-row">
        <label for="volumeSlider">Volume</label>
        <span class="volume-value" id="volumeValue">80%</span>
      </div>
      <input type="range" id="volumeSlider" min="0" max="100" step="5" value="80">
      <p class="volume-warning" id="volumeWarning" hidden>Low volume — you risk missing the timer.</p>
    </div>

    <!-- Icons: Font Awesome Free 6.7.2 (CC BY 4.0) — https://fontawesome.com/license/free -->
    <div class="buttons">
      <button id="startPauseBtn" class="btn btn-primary">
        <svg class="icon" viewBox="0 0 384 512" fill="currentColor" aria-hidden="true"><path d="M73 39c-14.8-9.1-33.4-9.4-48.5-.9S0 62.6 0 80L0 432c0 17.4 9.4 33.4 24.5 41.9s33.7 8.1 48.5-.9L361 297c14.3-8.7 23-24.2 23-41s-8.7-32.2-23-41L73 39z"/></svg>
        <span>Start</span>
      </button>
      <button id="resetBtn" class="btn btn-secondary">
        <svg class="icon" viewBox="0 0 512 512" fill="currentColor" aria-hidden="true"><path d="M48.5 224L40 224c-13.3 0-24-10.7-24-24L16 72c0-9.7 5.8-18.5 14.8-22.2s19.3-1.7 26.2 5.2L98.6 96.6c87.6-86.5 228.7-86.2 315.8 1c87.5 87.5 87.5 229.3 0 316.8s-229.3 87.5-316.8 0c-12.5-12.5-12.5-32.8 0-45.3s32.8-12.5 45.3 0c62.5 62.5 163.8 62.5 226.3 0s62.5-163.8 0-226.3c-62.2-62.2-162.7-62.5-225.3-1L185 183c6.9 6.9 8.9 17.2 5.2 26.2s-12.5 14.8-22.2 14.8L48.5 224z"/></svg>
        <span>Reset</span>
      </button>
      <button type="button" id="previewBtn" class="btn btn-secondary">
        <svg class="icon" viewBox="0 0 640 512" fill="currentColor" aria-hidden="true"><path d="M533.6 32.5C598.5 85.2 640 165.8 640 256s-41.5 170.7-106.4 223.5c-10.3 8.4-25.4 6.8-33.8-3.5s-6.8-25.4 3.5-33.8C557.5 398.2 592 331.2 592 256s-34.5-142.2-88.7-186.3c-10.3-8.4-11.8-23.5-3.5-33.8s23.5-11.8 33.8-3.5zM473.1 107c43.2 35.2 70.9 88.9 70.9 149s-27.7 113.8-70.9 149c-10.3 8.4-25.4 6.8-33.8-3.5s-6.8-25.4 3.5-33.8C475.3 341.3 496 301.1 496 256s-20.7-85.3-53.2-111.8c-10.3-8.4-11.8-23.5-3.5-33.8s23.5-11.8 33.8-3.5zm-60.5 74.5C434.1 199.1 448 225.9 448 256s-13.9 56.9-35.4 74.5c-10.3 8.4-25.4 6.8-33.8-3.5s-6.8-25.4 3.5-33.8C393.1 284.4 400 271 400 256s-6.9-28.4-17.7-37.3c-10.3-8.4-11.8-23.5-3.5-33.8s23.5-11.8 33.8-3.5zM301.1 34.8C312.6 40 320 51.4 320 64l0 384c0 12.6-7.4 24-18.9 29.2s-25 3.1-34.4-5.3L131.8 352 64 352c-35.3 0-64-28.7-64-64l0-64c0-35.3 28.7-64 64-64l67.8 0L266.7 40.1c9.4-8.4 22.9-10.4 34.4-5.3z"/></svg>
        <span>Preview</span>
      </button>
    </div>
  </main>

  <footer class="footer">
    <p>Made for Veridis Quo with Love</p>
    <p><a href="https://github.com/haswelldev/recycle" target="_blank" rel="noopener">GitHub</a> · Licensed under GPL-3.0</p>
  </footer>

  <audio id="soundAudio" preload="auto"></audio>

  <script src="app.js"></script>
</body>
</html>
